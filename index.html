<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAB-3D | Right To Water</title>
    <style>
        body { margin: 0; background-color: #151520; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #canvas-container { width: 80vw; height: 75vh; background-color: #ffffff; border: 1px solid #000; position: relative; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 10000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const textureLoader = new THREE.TextureLoader();
        const waterNormalMap = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/water/waternormals.jpg');
        waterNormalMap.wrapS = waterNormalMap.wrapT = THREE.RepeatWrapping;
        waterNormalMap.repeat.set(50, 50); 

        const waterGeo = new THREE.PlaneGeometry(1000, 1000);
        const waterMat = new THREE.MeshPhysicalMaterial({
            color: 0x34a1eb,         
            metalness: 0.15,         
            roughness: 0.1,          
            transmission: 0.7,       
            transparent: true,
            opacity: 1.0,            
            normalMap: waterNormalMap,
            normalScale: new THREE.Vector2(4.0, 4.0), 
            side: THREE.DoubleSide
        });
        
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        const birds = new THREE.Group();
        scene.add(birds);
        
        const birdGeo = new THREE.ConeGeometry(0.15, 0.5, 3); 
        birdGeo.rotateX(Math.PI / 2); // Point the nose forward
        const birdMat = new THREE.MeshBasicMaterial({ color: 0x222222 }); // Dark gray silhouette

        for(let i = 0; i < 9; i++) {
            const bird = new THREE.Mesh(birdGeo, birdMat);
            
            bird.userData = {
                angle: Math.random() * Math.PI * 2,
                radius: 12 + Math.random() * 8, // Orbit distance from center (12 to 20 units)
                speed: 0.005 + Math.random() * 0.005, // Flight speed
                yBase: 5 + Math.random() * 8, // Cruising altitude
                bobSpeed: 2 + Math.random() * 3 // How fast they bob up and down
            };
            birds.add(bird);
        }

        const loader = new GLTFLoader();
        loader.load('./3js.glb?v=10', (gltf) => {
            const model = gltf.scene;
            
            let box = new THREE.Box3().setFromObject(model);
            let size = box.getSize(new THREE.Vector3());
            
            const maxOriginalDim = Math.max(size.x, size.y, size.z);
            const scaleFactor = 20 / maxOriginalDim;
            model.scale.set(scaleFactor, scaleFactor, scaleFactor);

            box.setFromObject(model);
            size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            model.position.sub(center); 
            scene.add(model);

            const bottomOfModel = -(size.y / 2);
            water.position.y = bottomOfModel + (size.y * 0.50); 

            camera.position.set(30, 20, 30);
            camera.lookAt(0, 0, 0);
        });

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;

        function animate() {
            requestAnimationFrame(animate);
            
            waterNormalMap.offset.x -= 0.002;
            waterNormalMap.offset.y += 0.002;

            birds.children.forEach((bird) => {
                bird.userData.angle += bird.userData.speed;
                
                // Circle around the center (x and z)
                bird.position.x = Math.cos(bird.userData.angle) * bird.userData.radius;
                bird.position.z = Math.sin(bird.userData.angle) * bird.userData.radius;
                
                // Bob up and down (y)
                bird.position.y = bird.userData.yBase + Math.sin(bird.userData.angle * bird.userData.bobSpeed) * 0.5;
                
                // Point the bird in the direction it's flying
                bird.rotation.y = -bird.userData.angle;
            });

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
