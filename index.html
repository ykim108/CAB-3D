<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAB-3D | Perfect Water Level</title>
    <style>
        body { margin: 0; background-color: #151520; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #canvas-container { width: 80vw; height: 75vh; background-color: #ffffff; border: 1px solid #000; position: relative; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Water } from 'three/addons/objects/Water.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        // The camera now has a massive viewing distance just in case
        const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 10000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const textureLoader = new THREE.TextureLoader();
        const normalMap = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/water/waternormals.jpg');
        normalMap.wrapS = normalMap.wrapT = THREE.RepeatWrapping;

        // The water plane
        const water = new Water(new THREE.PlaneGeometry(1000, 1000), {
            textureWidth: 512,
            textureHeight: 512,
            waterNormals: normalMap,
            sunDirection: new THREE.Vector3().copy(dirLight.position).normalize(),
            sunColor: 0xffffff,
            waterColor: 0x82e1f1,
            distortionScale: 12.0, 
            size: 5.0,
            alpha: 0.9
        });
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        const loader = new GLTFLoader();
        // Added the ?v=3 to force GitHub to bypass the cache
        loader.load('./3js.glb?v=3', (gltf) => {
            const model = gltf.scene;
            
            // 1. Find the original size
            let box = new THREE.Box3().setFromObject(model);
            let size = box.getSize(new THREE.Vector3());
            
            // 2. FORCE THE SCALE: Make the model exactly 20 units wide
            const maxOriginalDim = Math.max(size.x, size.y, size.z);
            const scaleFactor = 20 / maxOriginalDim;
            model.scale.set(scaleFactor, scaleFactor, scaleFactor);

            // 3. Recalculate size and center AFTER scaling
            box.setFromObject(model);
            size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            // 4. Center it perfectly
            model.position.sub(center); 
            scene.add(model);

            // 5. Smart Water: Exactly 25% up from the bottom of the scaled model
            const bottomOfModel = -(size.y / 2);
            water.position.y = bottomOfModel + (size.y * 0.25); 

            // 6. Lock the camera in a perfect viewing spot
            camera.position.set(30, 20, 30);
            camera.lookAt(0, 0, 0);
        });

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;

        function animate() {
            requestAnimationFrame(animate);
            water.material.uniforms[ 'time' ].value += 1.2 / 60.0;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
